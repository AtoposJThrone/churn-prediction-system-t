server:
  port: ${MANAGER_SERVER_PORT:8080}

spring:
  application:
    name: churn-manager
  datasource:
    url: jdbc:h2:file:./runtime/manager-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    com.userchurn.manager: INFO

app:
  auth:
    token-ttl-hours: ${MANAGER_TOKEN_TTL_HOURS:12}
  jobs:
    default-log-subdir: manager-jobs
    preview-line-limit: ${MANAGER_LOG_PREVIEW_LINES:120}
