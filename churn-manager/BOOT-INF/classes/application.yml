server:
  port: ${MANAGER_SERVER_PORT:8080}

spring:
  application:
    name: churn-manager
  datasource:
    url: jdbc:h2:file:./runtime/manager-db;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
  h2:
    console:
      enabled: false
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    root: WARN
    com.churn.manager: INFO

app:
  auth:
    # 如果为空则在每次启动时生成一个随机的token secret。
    # 生产环境中应通过环境变量设置为固定值以保持token有效。 
    token-secret: ${MANAGER_TOKEN_SECRET:}
    token-ttl-hours: ${MANAGER_TOKEN_TTL_HOURS:12} #12小时token过期
  crypto:
    # 32位base64字符串（256位密钥）用于HMAC-SHA256签名。默认值是随机生成的，重启后会失效。
    # 生产环境中应通过环境变量设置为固定值以保持token有效。
    secret-key: ${MANAGER_SECRET_KEY:S7DbBkp9Gca/hPmGYt7BOHqJ1KfSvcnJERe/vcaU9ic=}
  jobs:
    log-subdir: ${MANAGER_LOG_SUBDIR:manager-jobs} # 日志文件存储在 ./runtime/manager-jobs/ 
    preview-lines: ${MANAGER_LOG_PREVIEW_LINES:200} # 预览日志时显示的行数
  init:
    # 首次创建生成的默认管理员账号，环境变量优先，默认为 admin/adminmvp123
    admin-username: ${INIT_ADMIN_USERNAME:admin}
    admin-password: ${INIT_ADMIN_PASSWORD:adminmvp123}
