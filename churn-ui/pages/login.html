<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — 用户流失预测管理系统</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="login-root">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🤓</div>
      <div class="logo-title">基米哈气预测管理系统</div>
      <div class="logo-sub">Tower Defense · Churn Manager</div>
    </div>
    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="username">用户名</label>
        <input id="username" name="username" type="text" class="form-control"
               placeholder="输入用户名" autofocus required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <input id="password" name="password" type="password" class="form-control"
               placeholder="输入密码" required>
      </div>
      <p id="loginError" class="text-danger mt-8" style="font-size:.85rem;min-height:1.2em;"></p>
      <button id="submitBtn" type="submit" class="btn btn-primary w100" style="margin-top:8px;">登  录</button>
    </form>
  </div>
</div>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
