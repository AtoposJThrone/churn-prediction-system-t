<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目详情 — 用户流失预测管理系统</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo"><span>🏰</span> ChurnManager</div>
    <div class="sidebar-nav">
      <a href="projects.html"  class="nav-item active">📁 项目管理</a>
      <a href="dashboard.html" class="nav-item">📊 数据仪表盘</a>
    </div>
    <div class="sidebar-footer">
      <div>已登录：<span id="userLabel"></span></div>
      <button class="logout-btn mt-8" id="logoutBtn">退出登录</button>
    </div>
  </nav>

  <!-- Main -->
  <div class="main-content">
    <div class="topbar">
      <a href="projects.html" class="btn btn-outline btn-sm">← 返回</a>
      <span class="topbar-title" id="topbarTitle">项目详情</span>
      <span class="topbar-user" id="projectName" style="color:#333;font-weight:600;"></span>
    </div>
    <div class="page">
      <div id="flash"></div>

      <!-- Tabs -->
      <div id="tabsContainer">
        <div class="tabs">
          <button class="tab-btn active" data-tab="overview">概览</button>
          <button class="tab-btn" data-tab="files">文件浏览</button>
          <button class="tab-btn" data-tab="pipelines">流水线 / 步骤</button>
          <button class="tab-btn" data-tab="jobs">任务历史</button>
          <button class="tab-btn" data-tab="schedules">定时调度</button>
        </div>

        <!-- Tab: Overview -->
        <div class="tab-panel active" data-tab="overview">
          <div id="overviewContent"></div>
        </div>

        <!-- Tab: Files -->
        <div class="tab-panel" data-tab="files">
          <div class="card">
            <div class="flex-center" style="gap:8px;flex-wrap:wrap;">
              <select id="fileScopeSelect" class="form-control" style="width:160px;" onchange="onScopeChange()">
                <option value="scripts">脚本目录</option>
                <option value="alert_output">告警输出</option>
                <option value="experiment_results">实验结果</option>
                <option value="logs">日志目录</option>
                <option value="plots">图表目录</option>
                <option value="origin">原始数据</option>
                <option value="transformed">转换数据</option>
                <option value="project">项目根目录</option>
              </select>
              <span id="currentBrowsePath" style="font-size:.82rem;color:var(--muted);font-family:monospace;"></span>
            </div>
            <div id="fileList" class="file-tree mt-12"></div>
          </div>
        </div>

        <!-- Tab: Pipelines -->
        <div class="tab-panel" data-tab="pipelines">
          <!-- Toolbar: pipeline selector + actions -->
          <div class="wb-toolbar">
            <select id="pipelineSelect" class="form-control" style="width:220px;" onchange="onPipelineSelect()">
              <option value="">— 新建流水线 —</option>
            </select>
            <input id="plName2" type="text" class="form-control" style="flex:1;min-width:140px;" placeholder="流水线名称 *">
            <input id="plDesc2" type="text" class="form-control" style="flex:2;min-width:160px;" placeholder="描述（可选）">
            <button class="btn btn-primary btn-sm" id="savePipelineBtn2">💾 保存</button>
            <button class="btn btn-primary btn-sm" id="runPipelineBtn2">▶ 运行</button>
            <button class="btn btn-danger btn-sm"  id="delPipelineBtn2">🗑 删除</button>
          </div>

          <!-- Main workbench: left scripts + right components -->
          <div class="wb-container">
            <div class="wb-left">
              <div class="wb-panel-hd">
                📁 脚本文件
                <button class="btn btn-outline btn-xs" id="refreshScriptsBtn" title="刷新">↺</button>
              </div>
              <div id="scriptFileList" class="wb-list"></div>
            </div>
            <div class="wb-right">
              <div class="wb-panel-hd">
                🔧 工作台
                <span class="text-muted" style="font-size:.72rem;">点击左侧脚本可添加到此处，拖拽排序</span>
              </div>
              <div id="workbenchList" class="wb-list"></div>
            </div>
          </div>

          <!-- Command config area -->
          <div class="card wb-cmd-area">
            <div class="card-header" style="margin-bottom:8px;">
              <span class="card-title">⚙ 命令配置</span>
              <span id="cmdConfigLabel" class="text-muted" style="font-size:.82rem;"></span>
            </div>
            <div id="cmdConfigBody">
              <p class="wb-placeholder">请在工作台中选择一个组件来配置其启动命令</p>
            </div>
            <!-- Preset command creator -->
            <div class="wb-preset-sep">
              <p style="font-weight:600;font-size:.84rem;margin-bottom:8px;">📦 创建预设命令组件</p>
              <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;">
                <div class="form-group" style="flex:1;min-width:120px;margin:0;">
                  <label class="form-label" style="font-size:.78rem;">预设名称</label>
                  <input id="presetLabel" type="text" class="form-control" placeholder="如：HDFS 目录初始化">
                </div>
                <div class="form-group" style="flex:3;min-width:200px;margin:0;">
                  <label class="form-label" style="font-size:.78rem;">命令内容</label>
                  <input id="presetCmd" type="text" class="form-control code-input" placeholder="如：hdfs dfs -mkdir -p /data/churn" style="height:36px;padding:4px 10px;">
                </div>
                <button class="btn btn-outline btn-sm" id="addPresetBtn" style="flex-shrink:0;">+ 添加到工作台</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Tab: Jobs -->
        <div class="tab-panel" data-tab="jobs">
          <div class="card" style="padding:0;overflow:hidden;">
            <div class="card-header" style="padding:14px 20px;border-bottom:1px solid var(--border);">
              <span class="card-title">任务历史</span>
              <button class="btn btn-outline btn-sm" onclick="loadJobs()">↺ 刷新</button>
            </div>
            <div class="table-responsive">
              <table class="styled">
                <thead><tr>
                  <th>ID</th><th>名称</th><th>状态</th><th>触发来源</th><th>创建时间</th><th>结束时间</th><th>操作</th>
                </tr></thead>
                <tbody id="jobsTbody"></tbody>
              </table>
            </div>
            <div id="jobsPagination" class="pagination" style="padding:10px 16px;"></div>
          </div>
        </div>

        <!-- Tab: Schedules -->
        <div class="tab-panel" data-tab="schedules">
          <div class="card">
            <div class="card-header">
              <span class="card-title">定时调度</span>
              <button class="btn btn-primary btn-sm" id="newScheduleBtn">＋ 新建调度</button>
            </div>
            <div id="scheduleList"></div>
          </div>
        </div>
      </div><!-- /tabsContainer -->
    </div>
  </div>
</div>

<!-- (Pipeline modal removed — workbench replaces it) -->

<!-- Schedule Modal -->
<div class="modal-overlay hidden" id="scheduleModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">新建调度任务</span>
      <button class="modal-close" onclick="closeModal('scheduleModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">调度名称 <span class="required">*</span></label>
        <input id="schName" type="text" class="form-control" placeholder="例：每日凌晨2点全量流水线">
      </div>
      <div class="form-group">
        <label class="form-label">执行频率 <span class="required">*</span></label>
        <select id="schFreq" class="form-control" onchange="onSchFreqChange()">
          <option value="daily">每天（指定时刻）</option>
          <option value="hourly">每小时（指定分钟）</option>
          <option value="weekly">每周（指定星期几 + 时刻）</option>
          <option value="monthly">每月（指定日期 + 时刻）</option>
          <option value="interval">每隔 N 分钟</option>
        </select>
      </div>
      <!-- daily / weekly / monthly -->
      <div id="schTimeRow" class="form-row" style="display:flex;gap:12px;">
        <div class="form-group" id="schWeekdayGroup" style="display:none;flex:1;">
          <label class="form-label">星期几</label>
          <select id="schWeekday" class="form-control">
            <option value="1">周一</option><option value="2">周二</option><option value="3">周三</option>
            <option value="4">周四</option><option value="5">周五</option><option value="6">周六</option><option value="0">周日</option>
          </select>
        </div>
        <div class="form-group" id="schMonthdayGroup" style="display:none;flex:1;">
          <label class="form-label">每月第几日</label>
          <select id="schMonthday" class="form-control"></select>
        </div>
        <div class="form-group" id="schHourGroup" style="flex:1;">
          <label class="form-label">小时（0–23）</label>
          <select id="schHour" class="form-control"></select>
        </div>
        <div class="form-group" id="schMinGroup" style="flex:1;">
          <label class="form-label">分钟（0–59）</label>
          <select id="schMin" class="form-control"></select>
        </div>
      </div>
      <!-- interval -->
      <div class="form-group" id="schIntervalGroup" style="display:none;">
        <label class="form-label">间隔（分钟）</label>
        <input id="schIntervalMin" type="number" class="form-control" value="30" min="1" max="1440" placeholder="30">
        <span class="form-text">最小 1 分钟，最大 1440 分钟（24 小时）</span>
      </div>
      <div class="form-group">
        <label class="form-label">生成的 Cron 表达式</label>
        <input id="schCronPreview" type="text" class="form-control" readonly
               style="font-family:monospace;background:#1c2128;color:#58a6ff;">
      </div>
      <div class="form-group">
        <label class="form-label">目标（流水线 / 步骤）</label>
        <select id="schTarget" class="form-control"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="cancelScheduleBtn">取消</button>
      <button class="btn btn-primary" id="saveScheduleBtn">创建调度</button>
    </div>
  </div>
</div>

<!-- Log Modal -->
<div class="modal-overlay hidden" id="logModal">
  <div class="modal modal-xl">
    <div class="modal-header">
      <span class="modal-title" id="logModalTitle">任务日志</span>
      <button class="modal-close" id="closeLogModal">✕</button>
    </div>
    <div class="modal-body" style="padding:12px;">
      <pre id="logContent" class="code-viewer" style="max-height:550px;"></pre>
    </div>
  </div>
</div>

<!-- File Preview Modal -->
<div class="modal-overlay hidden" id="filePreviewModal">
  <div class="modal" style="max-width:920px;">
    <div class="modal-header">
      <div style="flex:1;min-width:0;">
        <div style="font-size:.72rem;color:var(--muted);内容">&#x1F4C4; 文件预览</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
          <span id="previewModalPath" style="font-family:monospace;font-size:.82rem;word-break:break-all;"></span>
          <span id="previewModalExt" class="badge-ext"></span>
        </div>
      </div>
      <button class="modal-close" id="closePreviewBtn">✕</button>
    </div>
    <div id="previewLineInfo" style="padding:4px 14px;font-size:.74rem;color:var(--muted);background:#f8f9fa;border-bottom:1px solid var(--border);"></div>
    <div class="modal-body" style="padding:0;">
      <pre id="previewContent" class="code-viewer" style="border-radius:0 0 10px 10px;max-height:72vh;margin:0;"></pre>
    </div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/project.js"></script>
</body>
</html>
